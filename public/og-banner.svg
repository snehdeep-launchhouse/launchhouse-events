<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#006AE1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#006AE1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#006AE1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle geometric lines -->
  <line x1="0" y1="500" x2="1200" y2="400" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="550" x2="1200" y2="450" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="600" x2="1200" y2="500" stroke="white" stroke-opacity="0.02" stroke-width="1"/>
  <circle cx="950" cy="150" r="200" fill="white" fill-opacity="0.02"/>
  <circle cx="1000" cy="180" r="120" fill="white" fill-opacity="0.03"/>

  <!-- LH Monogram watermark -->
  <g transform="translate(820, 120)" opacity="0.08">
    <rect width="300" height="300" rx="60" fill="white"/>
    <path d="M80 240V60h30v150h70v30H80z" fill="#0A1628"/>
    <path d="M170 60h28l28 70 28-70h28l-42 100-14 40h-28l-14-40L170 60z" fill="#0A1628"/>
  </g>

  <!-- Logo mark -->
  <g transform="translate(100, 200)">
    <rect width="72" height="72" rx="15" fill="#006AE1"/>
    <path d="M20 54V18h6v30h16v6H20z" fill="white"/>
    <path d="M40 18h6l6 16 6-16h6L58 36l-3 9h-6l-3-9L40 18z" fill="white" opacity="0.9"/>
  </g>

  <!-- Brand name -->
  <text x="190" y="242" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" font-size="52" font-weight="700" fill="white" letter-spacing="-1">
    LaunchHouse Events
  </text>

  <!-- Divider line -->
  <rect x="100" y="290" width="80" height="3" rx="1.5" fill="#006AE1"/>

  <!-- Tagline -->
  <text x="100" y="340" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="24" font-weight="400" fill="white" fill-opacity="0.8">
    Expert Cvent Event Registration Management
  </text>
  <text x="100" y="380" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="22" font-weight="600" fill="white" fill-opacity="0.6" letter-spacing="3">
    FASTER · CHEAPER · BETTER
  </text>

  <!-- Website URL -->
  <text x="100" y="560" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="400" fill="white" fill-opacity="0.4">
    www.launchhouse.events
  </text>
</svg>